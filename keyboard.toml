# Encoder 0: [CW, CCW]
encoder_map = [
    [["MouseWheelDown", "MouseWheelUp"]],
    [["MouseWheelLeft", "MouseWheelRight"]],
    [["MouseWheelDown", "MouseWheelUp"]],
    [["AudioVolDown", "AudioVolUp"]],
    [["MouseWheelDown", "MouseWheelUp"]],
    [["MouseWheelDown", "MouseWheelUp"]],
    [["MouseWheelDown", "MouseWheelUp"]],
    [["MouseWheelDown", "MouseWheelUp"]],
    [["MouseWheelDown", "MouseWheelUp"]],
