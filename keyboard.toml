# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "roba"
product_name = "roba"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Yowie"
chip = "nrf52840"

[behavior.morse]
hold_timeout = "200ms"

[split]
connection = "ble"

[ble]
enabled = true

[rmk]
# BLE プロファイル数 (N)
ble_profiles_num = 5

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 6
ble_addr = [0x18, 0xe2, 0x47, 0x33, 0x32, 0x01]
# central 側のバッテリー計測設定（[ble] より優先）
battery_adc_pin = "P0_31"
# XIAO nRF52840 の BAT 分圧 (1M + 510k): measured=510, total=1510
adc_divider_measured = 510
adc_divider_total = 1510

[split.central.matrix]
matrix_type = "normal"
row_pins = ["P0_03", "P0_28", "P0_29", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10"]

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x47, 0x33, 0x32, 0x02]

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_03", "P0_28", "P0_29", "P1_11"]
col_pins = ["P1_15", "P1_14", "P1_13", "P1_12", "P0_10", "P0_09"]

# 左手側ロータリーエンコーダー (ALPS EC11)
# まず TOML 設定で実装し、必要なら peripheral.rs で Rust 実装へ切り替える。
[[split.peripheral.input_device.encoder]]
pin_a = "P0_05"
pin_b = "P0_02"
internal_pullup = true
# ZMK: a=xiao_d5=P0_05, b=xiao_d0=P0_02 (steps=24, triggers-per-rotation=10)
# pin_a は P0_04(D4) ではなく P0_05(D5) が正しい
phase = "resolution"
resolution = 2
reverse = false

[layout]
rows = 4
cols = 11
layers = 9
keymap = [
    [
        ["Q", "W", "E", "R", "T", "_", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "_", "H", "J", "K", "L", "Semicolon"],
        ["MT(Z, LShift)", "X", "C", "V", "B", "F14", "N", "M", "Comma", "Dot", "Slash"],
        ["LCtrl", "LGui", "F16", "Backspace", "LT(2, Enter)", "LT(3, Language2)", "F13", "F15", "LT(3, Language1)", "LT(1, Space)", "LAlt"],
    ],
